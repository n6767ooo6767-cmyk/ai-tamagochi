<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Тамагочи: Мега-Версия 🐾</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .game-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 420px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
        }
        .stat-box {
            font-weight: bold;
            font-size: 13px;
            text-align: left;
        }
        .money-box {
            background: #fff3cd;
            color: #856404;
            padding: 8px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .pet-avatar {
            font-size: 75px;
            margin: 15px 0;
            transition: transform 0.2s;
        }
        .pet-avatar:active { transform: scale(1.1); }
        
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin: 15px 0 5px 0;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #e9ecef; color: #adb5bd; cursor: not-allowed; }
        
        .btn-action { background: #e2e2e2; color: #333; }
        .btn-buy { background: #d1ecf1; color: #0c5460; }
        
        .inventory-display {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            text-align: left;
            margin-bottom: 10px;
        }
        
        .chat-section {
            margin-top: 15px;
        }
        .dialogue-box {
            height: 110px;
            overflow-y: auto;
            background: #212529;
            color: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .input-area {
            display: flex;
            gap: 5px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h2>AI Тамагочи 🐾</h2>
    
    <div class="money-box">💰 Баланс: <span id="money">100</span> монет</div>

    <div class="stats-grid">
        <div class="stat-box">🍖 Сытость: <span id="hunger">100</span>%</div>
        <div class="stat-box">🎉 Радость: <span id="happiness">100</span>%</div>
        <div class="stat-box">❤️ Здоровье: <span id="health">100</span>%</div>
        <div class="stat-box">⚡ Энергия: <span id="energy">100</span>%</div>
    </div>

    <div class="pet-avatar" id="pet">🐱</div>
    <div id="status-text" style="font-style: italic; color: #666; font-size: 13px; margin-bottom: 15px;">Я отлично себя чувствую!</div>

    <div class="section-title">Действия</div>
    <div class="grid-buttons">
        <button class="btn-action" onclick="playWithPet()">Поиграть 🎉 (+15 💰)</button>
        <button class="btn-action" onclick="sleepPet()">Уложить спать 💤</button>
    </div>

    <div class="section-title">Мой Рюкзак</div>
    <div class="inventory-display" id="inventory-text">
        🍖 Рыбов: 1 шт. | 💊 Лекарство: 0 шт.
    </div>
    <div class="grid-buttons">
        <button style="background: #ffccd5; color: #ff4d6d;" id="use-food" onclick="useItem('food')">Скормить рыбу 🍖</button>
        <button style="background: #ccffdd; color: #0f5132;" id="use-med" onclick="useItem('med')">Дать лекарство 💊</button>
    </div>

    <div class="section-title">Магазин вещей</div>
    <div class="grid-buttons">
        <button class="btn-buy" onclick="buyItem('food', 20)">Купить Рыбу 🍖 (20 💰)</button>
        <button class="btn-buy" onclick="buyItem('med', 50)">Купить Лекарство 💊 (50 💰)</button>
    </div>

    <div class="section-title">Чат с ИИ котиком</div>
    <div class="chat-section">
        <div class="dialogue-box" id="dialogue">
            <strong>Тамагочи:</strong> Привет! Напиши мне что-нибудь! 🐾
        </div>
        <div class="input-area">
            <input type="text" id="user-msg" placeholder="Поговори со мной...">
            <button style="background: #007bff; color: white; width: 50px;" onclick="sendMessage()">👉</button>
        </div>
    </div>
</div>

<script>
    // Состояние игры (как в Python!)
    let hunger = 100;
    let happiness = 100;
    let health = 100;
    let energy = 100;
    let money = 100;
    
    let inventory = {
        food: 1,
        med: 0
    };

    function updateUI() {
        document.getElementById('hunger').innerText = hunger;
        document.getElementById('happiness').innerText = happiness;
        document.getElementById('health').innerText = health;
        document.getElementById('energy').innerText = energy;
        document.getElementById('money').innerText = money;
        
        document.getElementById('inventory-text').innerText = `🍖 Рыбов: ${inventory.food} шт. | 💊 Лекарство: ${inventory.med} шт.`;
        
        document.getElementById('use-food').disabled = inventory.food <= 0;
        document.getElementById('use-med').disabled = inventory.med <= 0;

        const pet = document.getElementById('pet');
        const status = document.getElementById('status-text');
        
        if (health <= 0) {
            pet.innerText = "🪦";
            status.innerText = "Тамагочи погиб... Перезагрузи страницу, чтобы начать заново.";
            return;
        }
        
        if (health < 40) {
            pet.innerText = "🤒";
            status.innerText = "Я сильно болею, мне нужно лекарство!";
        } else if (energy < 30) {
            pet.innerText = "🥱";
            status.innerText = "Я хочу спать... Уложи меня в кровать.";
        } else if (hunger < 40 || happiness < 40) {
            pet.innerText = "😿";
            status.innerText = "Мне грустно или я хочу кушать...";
        } else {
            pet.innerText = "🐱";
            status.innerText = "Муррр, всё отлично!";
        }
    }

    function playWithPet() {
        if (energy < 20) {
            addMessage("Тамагочи", "Я слишком устал, чтобы играть... 🥱");
            return;
        }
        if (health <= 0) return;
        happiness = Math.min(100, happiness + 15);
        energy = Math.max(0, energy - 20);
        money += 15;
        addMessage("Вы", "Поиграли с котиком! 🎉");
        updateUI();
    }

    function sleepPet() {
        if (health <= 0) return;
        energy = Math.min(100, energy + 40);
        hunger = Math.max(0, hunger - 10);
        addMessage("Вы", "Уложили котика спать 💤 Энергия восстановлена!");
        updateUI();
    }

    function buyItem(type, cost) {
        if (health <= 0) return;
        if (money < cost) {
            addMessage("Система", "Не хватает монет! 💰");
            return;
        }
        money -= cost;
        inventory[type]++;
        addMessage("Вы", `Купили предмет в магазине!`);
        updateUI();
    }

    function useItem(type) {
        if (inventory[type] <= 0 || health <= 0) return;
        
        inventory[type]--;
        if (type === 'food') {
            hunger = Math.min(100, hunger + 30);
            addMessage("Вы", "Скормили вкусную рыбку 🍖");
        } else if (type === 'med') {
            health = Math.min(100, health + 40);
            addMessage("Вы", "Вылечили питомца лекарством 💊");
        }
        updateUI();
    }

    function addMessage(author, text) {
        const dialogue = document.getElementById('dialogue');
        dialogue.innerHTML += `<br><strong>${author}:</strong> ${text}`;
        dialogue.scrollTop = dialogue.scrollHeight;
    }

    // Умный контекстный чат без лагов
    async function sendMessage() {
        const input = document.getElementById('user-msg');
        const userText = input.value.trim().toLowerCase();
        if (!userText) return;

        addMessage("Вы", input.value);
        input.value = "";
        addMessage("Тамагочи", "Думает...");

        setTimeout(() => {
            let aiText = "";
            
            // Логика подбора реплик на основе ввода
            if (userText.includes("привет") || userText.includes("ку") || userText.includes("здравствуй")) {
                const приветы = ["Мяу! Приветики! Ты принес мне рыбов? 🐟", "Муррр! Привет, хозяин! 🐾", "Мяу! Наконец-то ты пришел! Давай играть! 🎉"];
                aiText = приветы[Math.floor(Math.random() * приветы.length)];
            } else if (userText.includes("дел") || userText.includes("как ты")) {
                if (hunger < 50) {
                    aiText = "Живот урчит... Мысли только о рыбке 🍖😿";
                } else if (energy < 40) {
                    aiText = "Глазки слипаются... Отправь меня поспать 🥱💤";
                } else {
                    aiText = "Все просто супермурчательно! Мяу! 🥰";
                }
            } else if (userText.includes("кушать") || userText.includes("рыб") || userText.includes("еда")) {
                aiText = inventory.food > 0 ? "О, у нас же есть рыбка в рюкзаке! Покорми меня скорее! 🍖" : "Рыба закончилась! Загляни в магазин за покупками 💰";
            } else if (userText.includes("кто ты") || userText.includes("зовут")) {
                aiText = "Я твой верный виртуальный кот-тамагочи! Напиши мой код на Python или играй прямо здесь! 💻🐾";
            } else if (userText.includes("дурак") || userText.includes("плохой")) {
                aiText = "Ну зачем ты так... Я же просто котик 😿 Купи мне рыбку в знак примирения?";
            } else {
                // Если котик не понял фразу, он отвечает случайным забавным фактом
                const дефолт = [
                    "Мяу! Это очень интересно, но давай лучше поиграем и заработаем монет? 💰",
                    "Муррр... Человеческий язык такой сложный! Почеши за ушком? 🐱",
                    "Мяу-эффект! Кстати, ты знал, что котики спят по 16 часов в сутки? Я тоже хочу! 💤",
                    "Ты самый лучший хозяин в мире! Мяу! ❤️"
                ];
                aiText = дефолт[Math.floor(Math.random() * дефолт.length)];
            }
            
            const dialogue = document.getElementById('dialogue');
            dialogue.innerHTML = dialogue.innerHTML.replace("<br><strong>Тамагочи:</strong> Думает...", "");
            addMessage("Тамагочи", aiText);
        }, 500);
    }

    // Каждые 15 секунд параметры падают (Тики игры)
    setInterval(() => {
        if (health <= 0) return;
        
        hunger = Math.max(0, hunger - 5);
        happiness = Math.max(0, happiness - 5);
        
        // Если голодает — падает здоровье
        if (hunger === 0) {
            health = Math.max(0, health - 10);
        }
        updateUI();
    }, 15000);

    updateUI();
</script>

</body>
</html>
